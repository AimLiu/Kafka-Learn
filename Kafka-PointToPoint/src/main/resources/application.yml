server:
  port: ${APP_SERVER_PORT:8080}

spring:
  application:
    name: Kafka-point-to-point
  kafka:
    producer:
      #指定了 Producer 启动时要连接的 Broker 地址
      bootstrap-servers: ${APP_KAFKA_PRODUCER_BOOTSTRAP_SERVERS:192.168.19.64:9092}
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      compression-type: ${APP_KAFKA_PRODUCER_COMPRESSION_TYPE:gzip}
    listener:
      missing-topics-fatal: false

logging:
  file:
    path: ${LOGGIN_FILE_PATH:./Kafka-PointToPoint/log}

app:
  kafka:
    produce-topic: ${APP_KAFKA_PRODUCE_TOPIC:kafka-learn-producer}
    send-timeout-seconds: ${APP_KAFKA_SEND_TIMEOUT_SECONDS:10}
  scheduler:
    send-delay-ms: ${APP_OUTBOX_DELAY_MS:5000}