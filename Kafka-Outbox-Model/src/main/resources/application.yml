server:
  port: ${APP_SERVER_PORT:17070}

spring:
  application:
    name: kafka-learn
  datasource:
    url: jdbc:postgresql://${APP_DB_HOST:192.168.19.64}:${APP_DB_PORT:5432}/${APP_DB_NAME:kafka-learn}
    username: ${APP_DB_USERNAME:postgres}
    password: ${APP_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    #bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:192.168.19.64:9092}
    producer:
      #指定了 Producer 启动时要连接的 Broker 地址
      bootstrap-servers: ${APP_KAFKA_PRODUCER_BOOTSTRAP_SERVERS:192.168.19.64:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: ${APP_KAFKA_CONSUMER_BOOTSTRAP_SERVERS:192.168.19.64:9092}
      group-id: ${APP_KAFKA_CONSUMER_GROUP:callback-demo-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.kafkalearn.demo.*
        spring.json.value.default.type: com.kafkalearn.demo.messaging.CallbackEventMessage
        spring.json.use.type.headers: false
    listener:
      missing-topics-fatal: false

logging:
  level:
    root: ${APP_LOG_LEVEL:INFO}

app:
  kafka:
    callback-topic: ${APP_KAFKA_CALLBACK_TOPIC:callback-demo-topic}
    send-timeout-seconds: ${APP_KAFKA_SEND_TIMEOUT_SECONDS:10}
  scheduler:
    outbox-delay-ms: ${APP_OUTBOX_DELAY_MS:5000}
    retry-delay-ms: ${APP_RETRY_DELAY_MS:10000}
    recovery-delay-ms: ${APP_RECOVERY_DELAY_MS:15000}
    batch-size: ${APP_SCHEDULER_BATCH_SIZE:20}
  retry:
    max-retry-count: ${APP_MAX_RETRY_COUNT:3}
    first-delay-seconds: ${APP_RETRY_FIRST_DELAY_SECONDS:30}
    second-delay-seconds: ${APP_RETRY_SECOND_DELAY_SECONDS:60}
    third-delay-seconds: ${APP_RETRY_THIRD_DELAY_SECONDS:180}
    consume-timeout-seconds: ${APP_CONSUME_TIMEOUT_SECONDS:120}
